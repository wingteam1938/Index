<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vehicle OSINT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:linear-gradient(180deg,#020617,#07132b);
color:#fff;
padding:15px;
min-height:100vh;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
font-size:42px;
font-weight:700;
text-align:center;
margin:25px 0;
background:linear-gradient(90deg,#4f8cff,#b44cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.top{
display:flex;
gap:12px;
margin-bottom:20px;
}

.top button{
flex:1;
border:none;
padding:15px;
border-radius:14px;
font-size:18px;
font-weight:600;
color:#fff;
background:linear-gradient(90deg,#4f8cff,#b44cff);
}

.card{
background:rgba(255,255,255,.04);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:18px;
margin-bottom:15px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:24px;
font-weight:600;
}

.price{
background:#10b981;
padding:10px 15px;
border-radius:10px;
font-weight:700;
}

.desc{
color:#94a3b8;
margin-top:10px;
line-height:1.5;
}

.action{
width:100%;
margin-top:15px;
border:none;
padding:15px;
border-radius:14px;
font-size:18px;
font-weight:600;
color:#fff;
background:linear-gradient(90deg,#4f8cff,#b44cff);
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
padding:20px;
}

.modal-box{
width:100%;
max-width:400px;
background:#0f172a;
padding:20px;
border-radius:20px;
}

.modal-box h2{
margin-bottom:15px;
}

.modal-box input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:17px;
margin-bottom:15px;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
color:white;
background:linear-gradient(90deg,#4f8cff,#b44cff);
}

.close{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

.footer{
text-align:center;
margin-top:40px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🔥 Vehicle OSINT</div>

<div class="top">
<button>👤 Profile</button>
<button>💎 Credits</button>
</div>

<div class="card">
<div class="row">
<div class="title">📱 Number Details</div>
<div class="price">₹250</div>
</div>

<div class="desc">
Get complete information about any mobile number.
</div>

<button class="action" onclick="openNumber()">
Search Number →
</button>
</div>

<div class="card">
<div class="row">
<div class="title">🚗 Vehicle Details</div>
<div class="price">₹200</div>
</div>

<div class="desc">
Get complete information about any vehicle.
</div>

<button class="action" onclick="openVehicle()">
Search Vehicle →
</button>
</div>

<div class="footer">
🛡️ Your Data is 100% Safe & Secure
</div>

</div>

<div class="modal" id="numberModal">
<div class="modal-box">
<h2>📱 Number Search</h2>

<input
id="number"
placeholder="Enter Mobile Number">

<button
class="search"
onclick="searchNumber()">
Search
</button>

<button
class="close"
onclick="closeModal()">
Close
</button>
</div>
</div>

<div class="modal" id="vehicleModal">
<div class="modal-box">
<h2>🚗 Vehicle Search</h2>

<input
id="vehicle"
placeholder="AP39AB1234">

<button
class="search"
onclick="searchVehicle()">
Search
</button>

<button
class="close"
onclick="closeModal()">
Close
</button>
</div>
</div>

<script>

function openNumber(){
document.getElementById("numberModal").style.display="flex";
}

function openVehicle(){
document.getElementById("vehicleModal").style.display="flex";
}

function closeModal(){
document.getElementById("numberModal").style.display="none";
document.getElementById("vehicleModal").style.display="none";
}

async function searchNumber(){

let number =
document.getElementById("number").value;

alert("API Request For: " + number);

/*
const res = await fetch(
'https://YOUR_API?number='+number
);

const data = await res.json();
*/

}

async function searchVehicle(){

let vehicle =
document.getElementById("vehicle").value;

alert("API Request For: " + vehicle);

/*
const res = await fetch(
'https://YOUR_API?vehicle='+vehicle
);

const data = await res.json();
*/

}

</script>

</body>
</html>
