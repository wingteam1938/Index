<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OSINT Mini App</title>

<style>
body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:25px;
}

.top{
display:flex;
gap:15px;
margin-bottom:25px;
}

.top button{
flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
color:white;
background:linear-gradient(90deg,#3b82f6,#9333ea);
}

.card{
background:#1e293b;
border-radius:15px;
padding:20px;
margin-bottom:20px;
}

.service{
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
margin-bottom:15px;
}

.price{
background:#10b981;
padding:10px 15px;
border-radius:8px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
margin-top:15px;
margin-bottom:15px;
}

.submit{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
color:white;
background:linear-gradient(90deg,#3b82f6,#9333ea);
}
.result{
margin-top:15px;
background:#111827;
padding:15px;
border-radius:10px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="logo">🔥 Vehicle OSINT</div>

<div class="top">
<button>👤 Profile</button>
<button>💎 Credits</button>
</div>

<div class="card">
<div class="service">
<span>📱 Number Details</span>
<span class="price">₹250</span>
</div>

<input id="number" placeholder="Enter Phone Number">

<button class="submit" onclick="searchNumber()">
Search Number
</button>

<div id="numberResult"></div>
</div>

<div class="card">
<div class="service">
<span>🚗 Vehicle Details</span>
<span class="price">₹200</span>
</div>

<input id="vehicle" placeholder="AP39AB1234">

<button class="submit" onclick="searchVehicle()">
Search Vehicle
</button>

<div id="vehicleResult"></div>
</div>

<script>

async function searchNumber(){

let num =
document.getElementById("number").value;

let api =
"https://YOUR_API_URL?number="+num;

let res = await fetch(api);

let data = await res.json();

document.getElementById("numberResult").innerHTML =
'<div class="result">'+
JSON.stringify(data,null,2)+
'</div>';

}

async function searchVehicle(){

let vehicle =
document.getElementById("vehicle").value;

let api =
"https://YOUR_API_URL?vehicle="+vehicle;

let res = await fetch(api);

let data = await res.json();

document.getElementById("vehicleResult").innerHTML =
'<div class="result">'+
JSON.stringify(data,null,2)+
'</div>';

}

</script>

</body>
</html>
